server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://analytics.debored.ai 'unsafe-inline' 'unsafe-eval'; style-src 'self' https://rsms.me https://fonts.googleapis.com https://cdn.jsdelivr.net 'unsafe-inline'; font-src 'self' https://rsms.me https://fonts.gstatic.com; img-src 'self' data: https://www.google.com https://maps.gstatic.com; frame-src 'self' https://www.google.com; connect-src 'self' https://analytics.debored.ai; manifest-src 'self';" always;

    error_page 404 /404.html;

    # Sitemap alias — Google expects /sitemap.xml, Astro builds sitemap-index.xml
    location = /sitemap.xml {
        try_files /sitemap-index.xml =404;
    }

    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
