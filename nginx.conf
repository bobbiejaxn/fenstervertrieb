server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;

    error_page 404 /404.html;

    location / {
        try_files $uri $uri/index.html $uri.html /404.html;
    }

    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}