    tags: [coding, fast, code-gen]
    notes: "480B MoE, 35B active. Hybrid thinking mode (not purely non-thinking). Fast code gen. Has Qwen Code CLI."

  # ─── MiniMax M2.7 ────────────────────────────────────────────────────────
  minimax-m2.7:
