# ─── Ollama Cloud Model Registry ──────────────────────────────────────────────
# Manually curated capability scores for models available on Ollama Cloud.
# Scores are 0-100 based on verified benchmarks + real-world agentic coding tests.
# Updated: 2026-04-24
#
# Sources:
#   - LMSYS Chatbot Arena (arena.ai) — human preference ELO
#   - AkitaOnRails LLM Coding Benchmark — practical project delivery
#   - SWE-bench Verified — real GitHub issue resolution
#   - LiveCodeBench — code generation
#
# Capability dimensions:
#   coding       — code generation, editing, debugging, multi-file
#   reasoning    — analysis, architecture, planning, trade-offs
#   structured   — structured output, JSON, YAML, specs, templates
#   speed        — TTFT + tokens/sec (higher = faster)
#   agentic      — tool use, multi-step workflows, following complex instructions
#
# role_fit: which agent roles this model excels at (for matching)
# tags: freeform labels for filtering

models:
  # ─── DeepSeek V4 (released Apr 24, 2026) ─────────────────────────────────
  deepseek-v4-flash:
    ollama_id: "deepseek-v4-flash:cloud"
    provider: deepseek
    params: "284B/13B active MoE"
    context: 1000000
    capabilities:
      coding: 78
      reasoning: 82
      structured: 75
      speed: 88
      agentic: 80
    role_fit: [reviewer, gate-skeptic, debug-agent, fixer, validation-lead, ui-reviewer, reasoning-researcher, web-researcher]
    tags: [reasoning, fast, new]
    notes: "Just released. 284B MoE with 13B active. Fast + strong reasoning. Successor to V3.2."

  deepseek-v4-pro:
    ollama_id: "deepseek-v4-pro:cloud"
    provider: deepseek
    params: "1.6T/49B active MoE"
    context: 1000000
    capabilities:
      coding: 88
      reasoning: 92
      structured: 80
      speed: 55
      agentic: 90
    role_fit: [architect, software-architect, security-reviewer, harness-evolver, gate-skeptic, board-architect, board-contrarian, security-advisor]
    tags: [deep-reasoning, slow, premium]
    notes: "1.6T MoE flagship. Deepest reasoning. Slower but thorough."

  # ─── DeepSeek V3.2 (stable) ──────────────────────────────────────────────
  deepseek-v3.2:
    ollama_id: "deepseek-v3.2:cloud"
    provider: deepseek
    params: "685B MoE"
    context: 131072
    capabilities:
      coding: 72
      reasoning: 85
      structured: 72
      speed: 65
      agentic: 78
    role_fit: [architect, security-reviewer, harness-evolver]
    tags: [deep-reasoning, stable]
    notes: "Scored 40 on AkitaOnRails benchmark. Solid reasoner but V4-Pro is better now."

  # ─── GLM-5.1 (Zhipu/ZAI) ────────────────────────────────────────────────
  glm-5.1:
    ollama_id: "glm-5.1:cloud"
    provider: zai
    params: "355B"
    context: 131072
    capabilities:
      coding: 82
      reasoning: 78
      structured: 70
      speed: 72
      agentic: 80
    role_fit: [implementer, backend-lead, test-writer, debug-agent]
    tags: [coding, proven, free-on-zai]
    notes: "#3 Code Arena (1530 ELO). 94.6% of Opus 4.6 coding. Free via ZAI direct API. Scored 43 on AkitaOnRails — arena and practical scores diverge."

  glm-5:
    ollama_id: "glm-5:cloud"
    provider: zai
    params: "large"
    context: 131072
    capabilities:
      coding: 80
      reasoning: 76
      structured: 68
      speed: 70
      agentic: 78
    role_fit: [implementer, test-writer, fixer]
    tags: [coding, free-on-zai]
    notes: "Previous gen. Still solid for implementation. Free on ZAI direct."

  # ─── Qwen3-Coder ─────────────────────────────────────────────────────────
  qwen3-coder-480b:
    ollama_id: "qwen3-coder:480b-cloud"
    provider: alibaba
    params: "480B/35B active MoE"
    context: 256000
    capabilities:
      coding: 80
      reasoning: 68
